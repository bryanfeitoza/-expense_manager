name: CI - Gerenciador de Gastos com IA

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-node:
    name: Node.js Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gerenciador_gastos_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: node/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: node
      - name: Run migrations
        run: npx sequelize-cli db:migrate
        working-directory: node
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: gerenciador_gastos_test
          DB_USER: postgres
          DB_PASSWORD: postgres
      - name: Run tests
        run: npm test
        working-directory: node
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: gerenciador_gastos_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          JWT_ACCESS_SECRET: test-access-secret
          JWT_REFRESH_SECRET: test-refresh-secret

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gerenciador_gastos_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: python
      - name: Run tests
        run: pytest tests/ -v
        working-directory: python
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: gerenciador_gastos_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          JWT_ACCESS_SECRET: test-access-secret
          JWT_REFRESH_SECRET: test-refresh-secret

  test-java:
    name: Java Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gerenciador_gastos_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      - name: Run tests
        run: mvn test -B
        working-directory: java
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: gerenciador_gastos_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          JWT_ACCESS_SECRET: test-access-secret
          JWT_REFRESH_SECRET: test-refresh-secret

  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Node dependencies
        run: npm ci
        working-directory: node
      - name: ESLint
        run: npx eslint src/
        working-directory: node
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python deps
        run: pip install flake8
        working-directory: python
      - name: Flake8
        run: flake8 app/ tests/
        working-directory: python
