<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador Financeiro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <div id="toast-container" class="toast-container"></div>
    <div id="auth-container"></div>

    <div id="app-container" class="d-none">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 18V6"/></svg>
                </div>
                <div class="brand-text">
                    <h5>Gastos</h5>
                    <small>Controle financeiro</small>
                </div>
            </div>
            <nav>
                <button class="nav-item active" data-page="dashboard">
                    <i class="bi bi-grid-1x2"></i> Dashboard
                </button>
                <button class="nav-item" data-page="transactions">
                    <i class="bi bi-arrow-left-right"></i> Transações
                </button>
                <button class="nav-item" data-page="calendar-heatmap">
                    <i class="bi bi-calendar-heart"></i> Calendário de Gastos
                </button>
                <button class="nav-item" data-page="categories">
                    <i class="bi bi-tags"></i> Categorias
                </button>
                <button class="nav-item" data-page="accounts">
                    <i class="bi bi-wallet2"></i> Contas
                </button>
                <button class="nav-item" data-page="goals">
                    <i class="bi bi-piggy-bank"></i> Metas
                </button>
                <button class="nav-item" data-page="budgets">
                    <i class="bi bi-pie-chart"></i> Orçamentos
                </button>
                <button class="nav-item" data-page="ai">
                    <i class="bi bi-bar-chart-line"></i> Análises
                </button>
                <button class="nav-item" data-page="reports">
                    <i class="bi bi-bar-chart"></i> Relatórios
                </button>
                <hr style="border-color:var(--border-color);margin:1rem">
                <button class="nav-item" onclick="App.handleLogout()" style="color:var(--red)">
                    <i class="bi bi-box-arrow-right"></i> Sair
                </button>
            </nav>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <div style="display:flex;align-items:center;gap:0.75rem">
                    <button class="mobile-toggle" id="mobileMenuToggle" onclick="App.toggleSidebar()">
                        <i class="bi bi-list"></i>
                    </button>
                    <h4 id="pageTitle">Dashboard</h4>
                </div>
                <div class="user-menu">
                    <button class="chat-toggle" id="chatToggleBtn" onclick="App.toggleChatPanel()" title="Perguntar">
                        <i class="bi bi-chat-dots"></i>
                    </button>
                    <div class="user-info">
                        <div class="user-name" id="userName"></div>
                        <div class="user-role">Administrador</div>
                    </div>
                    <div class="avatar" id="userAvatar">U</div>
                </div>
            </div>
            <div id="page-content"></div>
        </main>
    </div>

    <div id="chatOverlay" class="chat-overlay" onclick="App.toggleChatPanel()"></div>
    <div id="chatPanel" class="chat-panel">
        <div class="chat-header">
            <span class="chat-header-title">Pergunte sobre seus gastos</span>
            <button class="chat-close" onclick="App.toggleChatPanel()"><i class="bi bi-x-lg"></i></button>
        </div>
        <div class="chat-body" id="chatBody">
            <div class="chat-empty">
                <i class="bi bi-bar-chart-line"></i>
                <p>Faça perguntas sobre suas finanças.<br>Ex: "Quanto gastei esse mês?"</p>
            </div>
        </div>
        <div class="chat-input-area">
            <input type="text" class="chat-input" id="chatInput" placeholder="Digite sua pergunta..." onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();App.sendChatMessage()}">
            <button class="chat-send" id="chatSendBtn" onclick="App.sendChatMessage()"><i class="bi bi-send"></i></button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
