server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:gerenciador_gastos}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          lob:
            non_contextual_creation: true

app:
  jwt:
    access-secret: ${JWT_ACCESS_SECRET:dXNlci1hY2Nlc3Mtc2VjcmV0LWZvci1qd3QtdG9rZW4tZGV2ZWxvcG1lbnQtc3VwZXItc2VjdXJl}
    refresh-secret: ${JWT_REFRESH_SECRET:dXNlci1yZWZyZXNoLXNlY3JldC1mb3Itand0LXRva2VuLWRldmVsb3BtZW50LXN1cGVyLXNlY3VyZQ==}
    access-expires-in: 900000
    refresh-expires-in: 604800000
  ai:
    api-key: ${AI_API_KEY:}
    api-url: ${AI_API_URL:https://api.openai.com/v1}
    model: ${AI_MODEL:gpt-4}
